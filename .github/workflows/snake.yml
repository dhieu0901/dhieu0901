name: Generate Snake Animation

on:
  schedule:
    # Chạy tự động mỗi 12 tiếng
    - cron: "0 */12 * * *" 
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công
  push:
    branches:
    - main # Hoặc 'master' tùy vào nhánh chính của bạn

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Lấy dữ liệu contribution từ GitHub của bạn và tạo ra file ảnh
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Đẩy file ảnh vừa tạo lên một nhánh riêng biệt tên là 'output'
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
